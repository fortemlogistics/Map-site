<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fortem Cement Logistics Map PH</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Marker Cluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

  <!-- PapaParse -->
  <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
</head>
<body>
 <header class="top-navbar">
    <div>Fortem Cement Logistics Map PH</div>
    <nav class="header-menu">
        <!-- Integrated Unified Filter Selector -->
        <select id="map-filter" onchange="applyMapFilter(this.value)" style="padding: 5px 10px; border-radius: 4px; border: none; font-size: 14px; cursor: pointer;">
    <option value="ALL">All Data</option>
    <option value="IGNORE" disabled>──────────</option>
    <option value="V_TRAILER">Vehicle: Trailer</option>
    <option value="V_CARGO">Vehicle: Cargo</option>
    <option value="V_ELF">Vehicle: Elf</option>
    <option value="V_BULK">Vehicle: Bulk Truck</option>
    <option value="V_FORWARD">Vehicle: Forward</option>
    <option value="IGNORE" disabled>──────────</option>
    <option value="W_L02">Warehouse: L02 (Bataan)</option>
    <option value="W_L07">Warehouse: L07 (Pampanga)</option>
    <option value="W_L08">Warehouse: L08 (Tuguegarao)</option>
    <option value="W_L10">Warehouse: L10 (Currimao)</option>
    <option value="W_V01">Warehouse: V01 (Iloilo)</option>
    <option value="W_V02">Warehouse: V02 (Cebu)</option>
    <option value="W_V03">Warehouse: V03 (Bacolod)</option>
    <option value="W_M01">Warehouse: M01 (Davao)</option>
    <option value="W_M03">Warehouse: M03 (Gensan)</option>
    <option value="W_M04">Warehouse: M04 (Zamboanga)</option>
</select>

        <div class="import-toggle">
            <button onclick="toggleImport()">Import</button>
            <div id="import-container" class="hidden">
                <input type="file" id="csv-file" accept=".csv" />
            </div>
        </div>
        <button onclick="toggleAnalytics()">Analytics</button>
    </nav>
</header>

<div id="analytics-banner" class="hidden">
    <div id="analytics-content">
        <h2>Fortem Analytics</h2>
    </div>
</div>
<div id="map"></div>
    <script src="script.js"></script>
</body>
</html>
